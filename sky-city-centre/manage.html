<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manage Booking — Sky City Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@300;400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-deep: #0B3B3C;
    --gold: #C9A86A;
    --gold-deep: #A8884B;
    --ivory: #F7F3EC;
    --cream: #FBF8F2;
    --ink: #141414;
    --ink-mute: #5B5B5B;
    --danger: #B85D3E;
    --border: #E5DFD3;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--ivory);
    color: var(--ink);
    margin: 0;
    padding: 60px 20px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  html[dir="rtl"] body { font-family: 'IBM Plex Sans Arabic', Tahoma, sans-serif; }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    background: #fff;
    border-radius: 28px;
    padding: 44px 36px;
    box-shadow: 0 40px 100px -40px rgba(11, 59, 60, 0.25);
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 30px;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  html[dir="rtl"] h1 { font-family: 'IBM Plex Sans Arabic', Tahoma, sans-serif; font-weight: 600; }
  p.sub { color: var(--ink-mute); margin: 0 0 24px; font-size: 15px; }
  label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    font-weight: 600;
    margin: 0 0 6px;
  }
  input {
    width: 100%;
    padding: 16px 20px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 14px;
    background: var(--cream);
    color: var(--ink);
    transition: all 200ms ease;
  }
  input:focus {
    outline: none;
    border-color: var(--gold);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(201,168,106,0.15);
  }
  input#code-input {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }
  .btn {
    width: 100%;
    padding: 17px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 200ms ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-primary { background: var(--teal-deep); color: var(--ivory); }
  .btn-primary:hover { background: #13585A; }
  .btn-gold { background: var(--gold); color: var(--ink); box-shadow: 0 10px 28px -12px rgba(201,168,106,0.55); }
  .btn-gold:hover { background: var(--gold-deep); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); margin-top: 10px; }
  .btn-ghost:hover { background: var(--ink); color: var(--ivory); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #973f27; }

  .err { color: var(--danger); font-size: 14px; min-height: 20px; margin-top: 10px; font-weight: 500; }

  .info {
    padding: 24px;
    background: var(--ivory);
    border-radius: 18px;
    margin: 20px 0;
    text-align: center;
  }
  .info .name { font-family: 'Fraunces', serif; font-size: 22px; margin-bottom: 6px; color: var(--ink); }
  html[dir="rtl"] .info .name { font-family: 'IBM Plex Sans Arabic', Tahoma, sans-serif; font-weight: 600; }
  .info .when { font-size: 15px; color: var(--ink-mute); margin-bottom: 10px; }
  .status {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 999px;
  }
  .status.booked { background: var(--gold); color: var(--ink); }
  .status.cancelled { background: var(--danger); color: #fff; }

  .back {
    display: block;
    margin-top: 24px;
    font-size: 13px;
    color: var(--ink-mute);
    text-align: center;
    text-decoration: none;
  }
  .back:hover { color: var(--teal-deep); }

  .saved-hint {
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    color: var(--ink-mute);
    cursor: pointer;
    transition: border-color 200ms ease;
  }
  .saved-hint:hover { border-color: var(--gold); }
  .saved-hint strong { color: var(--ink); font-family: 'Fraunces', serif; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="wrap">
  <div id="lookup-view">
    <h1 data-en="Manage your booking" data-ar="إدارة حجزك">Manage your booking</h1>
    <p class="sub" data-en="Enter your phone number and 6-character cancel code." data-ar="أدخل رقم هاتفك والرمز المكوّن من 6 أحرف.">Enter your phone number and 6-character cancel code.</p>

    <label for="phone-input" data-en="Phone number" data-ar="رقم الهاتف">Phone number</label>
    <input type="tel" id="phone-input" placeholder="+962 ..." autocomplete="tel" />

    <label for="code-input" data-en="Cancel code" data-ar="رمز الإلغاء">Cancel code</label>
    <input type="text" id="code-input" placeholder="A7K3MZ" maxlength="6" autocomplete="off" />

    <button class="btn btn-primary" id="lookup-btn" data-en="Find my booking" data-ar="ابحث عن حجزي">Find my booking</button>
    <div class="err" id="lookup-err"></div>

    <div id="saved-list"></div>
  </div>

  <div id="result-view" style="display:none">
    <h1 data-en="Your booking" data-ar="حجزك">Your booking</h1>
    <div class="info" id="info"></div>
    <button class="btn btn-danger" id="cancel-btn" data-en="Cancel booking" data-ar="إلغاء الحجز">Cancel booking</button>
    <button class="btn btn-ghost" id="back-btn" data-en="Back" data-ar="رجوع">Back</button>
  </div>

  <a href="index.html" class="back" data-en="← Back to home" data-ar="→ العودة للرئيسية">← Back to home</a>
</div>

<script src="config.js"></script>
<script src="manage.js"></script>
</body>
</html>
