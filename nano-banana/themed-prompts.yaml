# Each prompt asks the model to use the GJU logo (passed as a reference image)
# as the visual style guide: geometric, three-colour palette (yellow, blue, dark
# teal), clean modern academic vibe.

- filename: gju-library-ai-logo.png
  role: library AI sub-brand mark, themed on GJU logo
  dimensions: 1024x1024
  prompt: |
    Use the attached GJU logo as the strict visual reference for STYLE and
    PALETTE — copy its colours exactly: bright yellow/gold, vivid blue, and
    deep teal/forest-green, on a clean white background. Keep the same
    minimal geometric vocabulary (overlapping squares, sharp corners,
    flat, modern, bold).

    Design a NEW companion mark for the GJU Library AI Assistant — a
    sub-brand. It should pair naturally next to the GJU logo without
    competing with it. Composition: a stylised open book formed from two
    overlapping geometric squares (yellow + blue), with a small teal AI
    "spark" or chat-dot above. Square canvas, generous padding, centred.
    Absolutely NO text, NO letters in any alphabet, NO Arabic calligraphy,
    NO words.

- filename: gju-library-ai-avatar.png
  role: chatbot avatar in GJU brand style
  dimensions: 512x512
  prompt: |
    Use the attached GJU logo as the strict visual reference for STYLE
    and PALETTE: bright yellow/gold, vivid blue, deep teal/forest-green
    on white. Same geometric, flat, minimal vocabulary as the GJU mark.

    Create a small circular chatbot avatar for the GJU library assistant.
    A friendly minimal book character formed from overlapping yellow and
    blue squares, with a tiny teal chat-bubble dot. Inside a clean white
    circular badge. Square canvas, centred. NO text, NO letters, NO words.

- filename: gju-library-ai-og.png
  role: social preview banner in GJU brand style
  dimensions: 1200x630
  prompt: |
    1200x630 Open Graph banner. Use the attached GJU logo as the strict
    style and palette reference: yellow/gold, vivid blue, deep teal,
    on a clean white background. Same geometric vocabulary.

    Composition: left third holds an abstract geometric emblem of an open
    book made from yellow + blue overlapping squares with a teal accent;
    right two-thirds is empty white space with a few faint teal dotted
    lines suggesting connection. Generous padding so a headline could be
    overlaid later. Absolutely NO text, NO letters, NO Arabic calligraphy,
    NO words rendered in the image itself.

- filename: gju-library-ai-hero.png
  role: landing hero in GJU brand style
  dimensions: 1920x800
  prompt: |
    Wide 1920x800 hero illustration for the GJU Library AI assistant
    landing page. Use the attached GJU logo as the strict palette and
    style reference: bright yellow/gold, vivid blue, deep teal/forest-
    green only — on a clean white background. Same flat, geometric, modern
    vocabulary as the GJU mark.

    Scene: an academic library abstracted into geometric shapes — yellow
    and blue rectangles representing book spines, teal arches representing
    reading-room windows, a small abstract speech-bubble shape in teal
    suggesting AI conversation. No people. Generous left margin so a
    headline can be overlaid later (do NOT render any headline). Absolutely
    NO text, NO letters, NO fake book titles, NO signage, NO words.

- filename: gju-library-ai-empty.png
  role: empty-chat-state illustration in GJU brand style
  dimensions: 600x400
  prompt: |
    Small empty-state illustration for an empty chat in the GJU library
    AI assistant. Use the attached GJU logo as the strict palette and
    style reference: yellow/gold, vivid blue, deep teal, on white. Same
    minimal geometric vocabulary.

    Composition: a single open book made from one yellow square and one
    blue square overlapping, with three small teal chat-bubble dots
    floating above it. Centered, generous negative space. Absolutely NO
    text, NO letters of any script, NO words.
