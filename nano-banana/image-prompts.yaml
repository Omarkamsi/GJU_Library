- filename: gju-library-ai-assistant-logo.png
  role: primary brand identity logo
  dimensions: 500x500
  prompt: A minimalist, academic-style logo for an AI library assistant. It features a stylized open book combined with subtle AI circuit board elements or a subtle brain icon, all within a clean, circular or shield-like emblem. The color palette is strictly cream and dark green. No text. Clean lines, friendly, and modest.
- filename: homepage-hero.png
  role: homepage hero banner
  dimensions: 1920x800
  prompt: A wide, illustrative hero image for a library AI assistant landing page. It depicts a warm, inviting library setting with abstract shelves of books, not showing any specific titles. In the foreground, a stylized, friendly AI chatbot interface appears as a glowing, ethereal thought bubble or a transparent screen overlaying a book. The overall style is academic and modest, rendered in a cream and dark green color palette, with soft lighting. No people are present.
- filename: empty-state-illustration.png
  role: empty state illustration for chat interface
  dimensions: 400x300
  prompt: A friendly, modest illustration for an empty chat state in a library AI assistant. It features a stylized, simplified open book with a question mark floating above it, rendered in a gentle, academic art style. The background is a soft gradient of cream, and the main elements are dark green. The composition is clean and inviting, encouraging user interaction. No people.
- filename: og-image.png
  role: social media preview image (Open Graph)
  dimensions: 1200x630
  prompt: An engaging, academic-style open graph image for a library AI assistant. It features a central, abstract icon representing knowledge and AI, such as a stylized brain made of interconnected lines or a minimalist glowing sphere surrounded by faint book shapes. The design is clean and balanced, utilizing a cream background and dark green accents. The overall aesthetic is friendly and modest, suitable for social sharing. No people.
- filename: chatbot-avatar.png
  role: chatbot avatar icon
  dimensions: 128x128
  prompt: A small, friendly, and modest icon for a library AI assistant's chatbot avatar. It shows a simple, abstract representation of an AI, perhaps a gentle, glowing sphere with subtle digital patterns, or a very minimalist, friendly robot head silhouette, combined with an open book motif. The color scheme is strictly cream and dark green. Clean, circular, and highly stylized. No text or people.
