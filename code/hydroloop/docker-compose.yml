services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t healthcheck -W 1 -C 1 || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    build: ./backend
    command: python -m ingest.main
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb: { condition: service_healthy }
      mosquitto:   { condition: service_started }

  api:
    build: ./backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb: { condition: service_healthy }

  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    ports:
      - "3000:3000"
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    profiles: ["prod"]

volumes:
  mosquitto_data:
  timescale_data:
  caddy_data:
  caddy_config:
