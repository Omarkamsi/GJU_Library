cities:
  amman:
    latitude: 31.95
    longitude: 35.93
  irbid:
    latitude: 32.56
    longitude: 35.85
  aqaba:
    latitude: 29.53
    longitude: 35.01

data:
  start_date: "2014-01-01"
  end_date: "2023-12-31"
  variables:
    - temperature_2m
    - relative_humidity_2m
    - wind_speed_10m
    - pressure_msl
    - dew_point_2m
    - shortwave_radiation
    - wind_gusts_10m
  targets:
    - temperature_2m
    - relative_humidity_2m
    - wind_speed_10m
  lag_hours: [1, 6, 24, 168]
  rolling_windows: [24, 168]
  raw_dir: "data/raw"
  processed_dir: "data/processed"

split:
  train_years: 7
  val_years: 2
  test_years: 1

model:
  window_size: 168
  horizons: [6, 12, 24, 48, 72]
  batch_size: 32

gru:
  hidden_size: 128
  num_layers: 2
  dropout: 0.3

tft:
  hidden_size: 64
  num_heads: 4
  dropout: 0.3
  quantiles: [0.1, 0.5, 0.9]

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_patience: 5
  early_stopping_patience: 10
  max_epochs: 100

experiments:
  log_dir: "experiments/logs"
